# Cloudflare Worker config for the Voeli translation proxy.
#
# Before first deploy, run:
#   wrangler kv:namespace create QUOTA_KV
#   wrangler kv:namespace create QUOTA_KV --preview
# Then paste the returned IDs into [[kv_namespaces]] below.
#
# Then set secrets (one-off, never committed):
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put FIREBASE_PROJECT_ID
# (FIREBASE_PROJECT_ID can also be a plain var if you don't mind it being
#  visible in the dashboard — it's not actually a secret. Keeping it as a
#  secret is just a habit so config is one consistent thing.)

name = "voeli-translate-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"
# Required by @sentry/cloudflare (uses some node-shimmed primitives).
compatibility_flags = ["nodejs_compat"]

# Bind KV namespace for per-user daily quota counters and JWKS cache.
# Replace the IDs below after running the kv:namespace create commands above.
[[kv_namespaces]]
binding = "QUOTA_KV"
id = "0cdd938abdda44f5acaa0fcb68b9cc93"
preview_id = "F580c51688b342d7b93eeaef02b4f6ed"

# Public configuration — safe to commit.
[vars]
# Comma-separated list of origins allowed to call this Worker.
# Add localhost for local dev, your production domain when you deploy.
ALLOWED_ORIGINS = "http://localhost:8787,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8089,http://localhost:8089,https://voeli.pages.dev,https://voeli.app,https://www.voeli.app"
# Daily translation quota per user (covers /translate + /translate-quick).
# Voice and grammar each have their own buckets — see src/quota.ts.
DAILY_TRANSLATE_QUOTA = "100"
DAILY_VOICE_QUOTA = "30"
DAILY_GRAMMAR_QUOTA = "300"
# Sentry DSN for the Worker — public ingest endpoint, NOT a secret.
SENTRY_DSN = "https://d8e4fec90119dae1b7db1180356d4fec@o4511283666026496.ingest.us.sentry.io/4511283820101632"
