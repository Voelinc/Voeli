# Cloudflare Worker config for the Voeli translation proxy.
#
# Before first deploy, run:
#   wrangler kv:namespace create QUOTA_KV
#   wrangler kv:namespace create QUOTA_KV --preview
# Then paste the returned IDs into [[kv_namespaces]] below.
#
# Then set secrets (one-off, never committed):
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put FIREBASE_PROJECT_ID
#   wrangler secret put FIREBASE_PROJECT_NUMBER     # numeric, for App Check
#   wrangler secret put MESSAGE_ENCRYPTION_KEY      # 32-byte base64 AES-256
#   wrangler secret put TENOR_API_KEY               # used by /api/tenor proxy
#   wrangler secret put APP_CHECK_DEBUG_TOKENS      # comma-separated, optional
# (FIREBASE_PROJECT_ID and FIREBASE_PROJECT_NUMBER can also be plain vars if
#  you don't mind them being visible in the dashboard — they aren't sensitive.
#  Keeping as secrets is just a habit so all config is one consistent thing.)

name = "voeli-translate-worker"
main = "src/index.ts"
compatibility_date = "2024-09-01"
# Required by @sentry/cloudflare (uses some node-shimmed primitives).
compatibility_flags = ["nodejs_compat"]

# Bind KV namespace for per-user daily quota counters and JWKS cache.
# Replace the IDs below after running the kv:namespace create commands above.
[[kv_namespaces]]
binding = "QUOTA_KV"
id = "0cdd938abdda44f5acaa0fcb68b9cc93"
preview_id = "F580c51688b342d7b93eeaef02b4f6ed"

# Public configuration — safe to commit.
[vars]
# Comma-separated list of origins allowed to call this Worker.
# Add localhost for local dev, your production domain when you deploy.
ALLOWED_ORIGINS = "http://localhost:8787,http://127.0.0.1:5500,http://localhost:5500,http://127.0.0.1:8089,http://localhost:8089,https://voeli.pages.dev,https://voeli.app,https://www.voeli.app"
# Daily translation quota per user (covers /translate + /translate-quick).
# Voice and grammar each have their own buckets — see src/quota.ts.
DAILY_TRANSLATE_QUOTA = "100"
DAILY_VOICE_QUOTA = "30"
DAILY_GRAMMAR_QUOTA = "300"
# Sentry DSN for the Worker — public ingest endpoint, NOT a secret.
SENTRY_DSN = "https://d8e4fec90119dae1b7db1180356d4fec@o4511283666026496.ingest.us.sentry.io/4511283820101632"

# App Check enforcement. Set to "false" during the rollout window so the
# backend can ship before the frontend integration is everywhere; flip to
# "true" once App Check tokens are arriving on >99% of /api/* requests.
APP_CHECK_ENFORCE = "false"

# Per-endpoint rate limits (requests per minute). Each endpoint has a
# _PER_USER and _PER_IP variant; both are checked. Defaults live in
# rate-limit.ts and kick in if the env var is missing — values here are
# the same defaults, exposed so you can tune without redeploying code.
RL_TRANSLATE_PER_USER = "15"
RL_TRANSLATE_PER_IP = "30"
RL_TRANSLATE_QUICK_PER_USER = "15"
RL_TRANSLATE_QUICK_PER_IP = "30"
RL_TRANSLATE_VOICE_PER_USER = "4"
RL_TRANSLATE_VOICE_PER_IP = "10"
RL_GRAMMAR_PER_USER = "40"
RL_GRAMMAR_PER_IP = "80"
RL_ENCRYPT_PER_USER = "30"
RL_ENCRYPT_PER_IP = "60"
RL_DECRYPT_PER_USER = "30"
RL_DECRYPT_PER_IP = "60"
RL_QUOTA_PER_USER = "30"
RL_QUOTA_PER_IP = "60"
RL_TENOR_PER_USER = "30"
RL_TENOR_PER_IP = "60"
RL_HEALTH_PER_IP = "60"
